version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: assetcore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetcore
      POSTGRES_USER: assetcore
      POSTGRES_PASSWORD: localdev123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: assetcore-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
